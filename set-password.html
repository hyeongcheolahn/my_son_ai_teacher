<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 만들기</title>
  <style>
    body{font-family:system-ui,-apple-system,"Apple SD Gothic Neo",sans-serif;
      background:#0d1530;color:#fff;display:flex;justify-content:center;
      align-items:flex-start;min-height:100vh;margin:0;padding:40px 16px;}
    .box{background:#fff;color:#1b2a4a;border-radius:18px;padding:28px;
      width:min(92vw,460px);box-shadow:0 20px 60px rgba(0,0,0,.4);}
    h1{font-size:20px;margin:0 0 6px;}
    p{font-size:14px;color:#556;line-height:1.6;}
    ol{font-size:14px;color:#334;line-height:1.7;padding-left:20px;}
    code{background:#eef1f7;padding:2px 6px;border-radius:6px;}
    input{width:100%;box-sizing:border-box;padding:13px;font-size:17px;
      border:2px solid #cdd6e6;border-radius:10px;outline:none;margin:8px 0 14px;}
    input:focus{border-color:#3b6cff;}
    button{padding:12px 18px;font-size:15px;font-weight:700;color:#fff;
      background:#3b6cff;border:none;border-radius:10px;cursor:pointer;}
    .result{margin-top:18px;display:none;}
    .hash{background:#0d1530;color:#7CFC9A;font-family:monospace;font-size:13px;
      word-break:break-all;padding:14px;border-radius:10px;margin-top:8px;}
    .copy{margin-top:8px;background:#2aa46a;}
  </style>
</head>
<body>
  <div class="box">
    <h1>🔑 비밀번호 만들기</h1>
    <p>여기서 만든 "해시값"을 <code>src/gate.js</code> 파일의
      <code>PASSWORD_HASH</code> 값으로 바꿔 넣으면 비밀번호가 변경돼요.</p>

    <input id="pw" type="text" placeholder="원하는 비밀번호 입력" autocomplete="off" />
    <button id="make">해시값 만들기</button>

    <div class="result" id="result">
      <strong>아래 값을 복사하세요 👇</strong>
      <div class="hash" id="hash"></div>
      <button class="copy" id="copy">복사하기</button>
      <ol>
        <li><code>src/gate.js</code> 파일을 엽니다.</li>
        <li><code>const PASSWORD_HASH = '...'</code> 의 따옴표 안 값을 위 값으로 교체.</li>
        <li>저장 후 커밋/푸시하면 새 비밀번호가 적용돼요.</li>
      </ol>
    </div>
  </div>

  <script>
    async function sha256(text) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
      return [...new Uint8Array(buf)].map((b) => b.toString(16).padStart(2, '0')).join('');
    }
    const pw = document.getElementById('pw');
    const hashEl = document.getElementById('hash');
    const result = document.getElementById('result');
    async function make() {
      if (!pw.value) return;
      hashEl.textContent = await sha256(pw.value);
      result.style.display = 'block';
    }
    document.getElementById('make').addEventListener('click', make);
    pw.addEventListener('keydown', (e) => { if (e.key === 'Enter') make(); });
    document.getElementById('copy').addEventListener('click', () => {
      navigator.clipboard.writeText(hashEl.textContent);
      document.getElementById('copy').textContent = '복사됨! ✓';
    });
  </script>
</body>
</html>
